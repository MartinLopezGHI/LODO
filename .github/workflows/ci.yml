name: CI - Quality Check
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main] # Corre en todas las ramas menos en main

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
      - name: Verify Build
        run: cd backend && go build -v ./cmd/api/main.go

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: cd frontend && npm install
      - name: Verify Lint/Build
        run: cd frontend && npm run build